name: "Release"

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install pnpm
        uses: pnpm/action-setup@v4

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        run: pnpm install

      - name: Build Desktop (Windows/macOS/Linux)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        with:
          tagName: v__VERSION__ # tauri-action will replace this
          releaseName: "VLoc v__VERSION__"
          releaseBody: "VLoc Official Release"
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          distPath: ../dist
          projectPath: ./apps/desktop-mobile

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install pnpm
        uses: pnpm/action-setup@v4

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: setup Android SDK
        uses: android-actions/setup-android@v3

      - name: install NDK
        run: sdkmanager "ndk;28.2.13676358" # Match local NDK version

      - name: install frontend dependencies
        run: pnpm install

      - name: Build Android APK
        run: pnpm tauri android build --release
        working-directory: ./apps/desktop-mobile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_SIGNING_KEY }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}

      - name: Sign APK
        if: env.ANDROID_SIGNING_KEY != null
        run: |
          echo "${{ secrets.ANDROID_SIGNING_KEY }}" | base64 -d > release.keystore
          # Note: Modern Tauri builds often handle signing via Gradle if Env vars are set.
          # If manual signing is needed, we'd use apksigner here.
          # For now, we'll ensure the artifact is uploaded.

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: VLoc-Android-Release-APK
          path: apps/desktop-mobile/src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release.apk
